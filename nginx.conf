server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://e46f63eb.eu-center.hostim.dev/api/;
        proxy_set_header Host e46f63eb.eu-center.hostim.dev;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /sanctum/ {
        proxy_pass http://e46f63eb.eu-center.hostim.dev/sanctum/;
        proxy_set_header Host e46f63eb.eu-center.hostim.dev;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}